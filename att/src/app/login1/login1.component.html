<!DOCTYPE html>
<html>
<head>
  <title>Login</title>
  <meta charset="utf-8">
  <meta name="viewport" content="width=device-width, initial-scale=1">
  <link href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.0/dist/css/bootstrap.min.css" rel="stylesheet" integrity="sha384-9ndCyUaIbzAi2FUVXJi0CjmCapSmO7SnpJef0486qhLnuZ2cdeRhO02iuK6FUUVM" crossorigin="anonymous">
  <a routerLink="/login1">Login 1</a>
</head>
<body>
  <div class="container-fluid">
    <div class="row my-5">
      <div class="col"></div>
      <div class="col-md-3 my-5 me-3">
        <div class="card shadow">
          
            <form [formGroup]="loginForm1" (ngSubmit)="login1()">
            <h4 class="text-success">User Login</h4>
            <div class="mb-3">
              <label for="exampleInputEmail" class="form-label">Email address</label>
              <input type="email" class="form-control" formControlName="email" placeholder="Enter email">
              <small *ngIf="loginForm1.get('email')?.invalid && loginForm1.get('email')?.touched" class="text-danger">Invalid email format.</small>
            </div>
            <div class="mb-3">
              <label for="exampleInputPassword" class="form-label">Password</label>
              <input type="password" class="form-control" id="exampleInputPassword" formControlName="password" placeholder="Enter password">
              <small *ngIf="loginForm1.get('password')?.invalid && loginForm1.get('password')?.touched" class="text-danger">Password is required.</small>
            </div>
           
            <button type="submit" class="btn btn-primary btn-sm mb-4 btn-warning" [disabled]="!loginForm1.valid">Log in</button>
          </form>
        </div>
      </div>
    </div>
  </div>
</body>
</html>
